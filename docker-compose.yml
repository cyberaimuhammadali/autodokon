version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dokon_db
    restart: always
    environment:
      POSTGRES_USER: dokon_user
      POSTGRES_PASSWORD: dokon_password
      POSTGRES_DB: dokon_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dokon_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
